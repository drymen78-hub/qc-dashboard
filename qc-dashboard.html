<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>야간책임운영실 QC 현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#f1f5f9;font-family:'Segoe UI',Arial,sans-serif;padding:16px}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState,useEffect=React.useEffect,useRef=React.useRef;
Chart.register(ChartDataLabels);

var GAS_URL="https://script.google.com/macros/s/AKfycbyQSpwiQBOuLF2oaOaW-Ka35XFmAg9Yp4vmh4P1ByPMUerACu6Ou56-1x4JEuT4_zE8Jw/exec";
var DEFECT_TYPES=["얼룩","손상","먼지"];
var DEFECT_COLORS=["#f87171","#fbbf24","#a78bfa","#94a3b8"];

function st(v){return(v==null?"":String(v)).trim();}
function isPass(v){var t=st(v).replace(/\s/g,"");return t.includes("적합")&&!t.includes("부적합");}
function isFail(v){var t=st(v).replace(/\s/g,"");return t.includes("부적합")||t.includes("불합격");}
function isY(v){return st(v)==="Y";}
function isN(v){return st(v)==="N";}
function fuzzy(cols,t){return cols.find(function(c){return st(c).replace(/\s/g,"")=== t.replace(/\s/g,"");})||cols.find(function(c){return st(c).includes(t);});}
function pct(a,b){return b>0?+(a/b*100).toFixed(1):0;}

// ── 차트 컴포넌트 ─────────────────────────────────────────────────────────────
function ChartBox(props){
  var ref=useRef(null);
  var chartRef=useRef(null);
  var key=JSON.stringify(props.config);
  useEffect(function(){
    if(!ref.current||!props.config)return;
    if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}
    chartRef.current=new Chart(ref.current,props.config);
    return function(){if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
  },[key]);
  return React.createElement("div",{style:{position:"relative",height:props.height||"200px",width:"100%"}},
    React.createElement("canvas",{ref:ref})
  );
}

function App(){
  var r;
  r=useState(null);var analysis=r[0],setAnalysis=r[1];
  r=useState("");var fileName=r[0],setFileName=r[1];
  r=useState(new Date().toISOString().slice(0,10));var reportDate=r[0],setReportDate=r[1];
  r=useState({얼룩:"",손상:"",먼지:""});var defects=r[0],setDefects=r[1];
  r=useState(false);var defectSaved=r[0],setDefectSaved=r[1];
  r=useState(null);var defectData=r[0],setDefectData=r[1];
  r=useState([]);var records=r[0],setRecords=r[1];
  r=useState(false);var saved=r[0],setSaved=r[1];
  r=useState(false);var saving=r[0],setSaving=r[1];
  r=useState("");var saveMsg=r[0],setSaveMsg=r[1];
  r=useState("");var error=r[0],setError=r[1];

  var mon=(reportDate||"").slice(5,7).replace(/^0/,"");
  var day=(reportDate||"").slice(8,10).replace(/^0/,"");

  useEffect(function(){
    fetch(GAS_URL)
      .then(function(res){return res.json();})
      .then(function(rows){
        var recs=rows.filter(function(r){return r[0]&&r[0]!=="날짜";})
          .map(function(r){return{date:st(r[0]),label:st(r[0]).slice(5).replace("-","/"),
            total:Number(r[1]),pass:Number(r[2]),fail:Number(r[3]),failRate:Number(r[4])};})
          .sort(function(a,b){return a.date.localeCompare(b.date);});
        setRecords(recs);
        try{localStorage.setItem("qc_recs",JSON.stringify(recs));}catch{}
      })
      .catch(function(){
        try{var loc=JSON.parse(localStorage.getItem("qc_recs")||"[]");setRecords(loc);}catch{}
      });
  },[]);

  function parseFile(file){
    setFileName(file.name);setError("");setDefectSaved(false);setDefectData(null);
    setSaved(false);setSaveMsg("");setDefects({얼룩:"",손상:"",먼지:""});setAnalysis(null);
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:"",raw:false});
        if(!rows.length){setError("데이터 없음");return;}
        var cols=Object.keys(rows[0]);
        var rC=fuzzy(cols,"품질검사결과");
        var iC=fuzzy(cols,"품목명")||fuzzy(cols,"중분류");
        var sC=fuzzy(cols,"얼룩체크");
        var total=rows.length,pass=0,fail=0;
        rows.forEach(function(r){if(isPass(r[rC]))pass++;else if(isFail(r[rC]))fail++;});
        var iMap={};
        rows.forEach(function(r){
          var item=st(r[iC])||"미기재";
          if(!iMap[item])iMap[item]={pass:0,fail:0};
          if(isPass(r[rC]))iMap[item].pass++;else if(isFail(r[rC]))iMap[item].fail++;
        });
        var itemStats=Object.entries(iMap)
          .map(function(e){return{name:e[0],pass:e[1].pass,fail:e[1].fail,
            total:e[1].pass+e[1].fail,failRate:pct(e[1].fail,e[1].pass+e[1].fail)};})
          .sort(function(a,b){return b.total-a.total;}).slice(0,12);
        var stainStats=null;
        if(sC){
          var sm={Y:{pass:0,fail:0},N:{pass:0,fail:0}};
          rows.forEach(function(r){
            var b=isY(r[sC])?"Y":isN(r[sC])?"N":null;
            if(!b)return;
            if(isPass(r[rC]))sm[b].pass++;else if(isFail(r[rC]))sm[b].fail++;
          });
          stainStats=["Y","N"].map(function(k){return{name:k==="Y"?"Y":"N",key:k,
            pass:sm[k].pass,fail:sm[k].fail,total:sm[k].pass+sm[k].fail,
            failRate:pct(sm[k].fail,sm[k].pass+sm[k].fail)};});
        }
        setAnalysis({total:total,pass:pass,fail:fail,itemStats:itemStats,stainStats:stainStats});
      }catch(err){setError("파싱 오류: "+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function handleSave(){
    if(!analysis||!reportDate)return;
    setSaving(true);setSaveMsg("");
    var defectFilled={};
    if(defectSaved&&defectData)defectData.forEach(function(x){defectFilled["defect_"+x.name]=x.value;});
    var failRate=pct(analysis.fail,analysis.total);
    var payload=Object.assign({date:reportDate,total:analysis.total,pass:analysis.pass,
      fail:analysis.fail,failRate:failRate},defectFilled);
    var label=reportDate.slice(5).replace("-","/");
    var newRec={date:reportDate,label:label,total:analysis.total,pass:analysis.pass,
      fail:analysis.fail,failRate:failRate};
    var updated=records.filter(function(r){return r.date!==reportDate;});
    updated.push(newRec);
    updated.sort(function(a,b){return a.date.localeCompare(b.date);});
    try{localStorage.setItem("qc_recs",JSON.stringify(updated));}catch{}
    setRecords(updated);
    fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify(payload)})
      .then(function(){setSaving(false);setSaved(true);setSaveMsg("✓ 저장 완료");})
      .catch(function(){setSaving(false);setSaved(true);setSaveMsg("✓ 저장 완료");});
  }

  function doSaveDefects(){
    var entered=DEFECT_TYPES.reduce(function(s,t){return s+(Number(defects[t])||0);},0);
    var etc=Math.max(0,analysis.fail-entered);
    var data=DEFECT_TYPES.map(function(t,i){return{name:t,value:Number(defects[t])||0,color:DEFECT_COLORS[i]};});
    if(etc>0)data.push({name:"기타",value:etc,color:DEFECT_COLORS[3]});
    data=data.filter(function(d){return d.value>0;});
    setDefectData(data);setDefectSaved(true);
  }

  var failRate=analysis?pct(analysis.fail,analysis.total):0;
  var passRate=analysis?pct(analysis.pass,analysis.total):0;
  var entered=DEFECT_TYPES.reduce(function(s,t){return s+(Number(defects[t])||0);},0);
  var etc=analysis?Math.max(0,analysis.fail-entered):0;

  // ── 차트 configs ─────────────────────────────────────────────────────────────

  // 원그래프 — 정사각형 컨테이너로 찌그러짐 방지
  var pieConfig=analysis?{
    type:"doughnut",
    data:{labels:["적합","부적합"],
      datasets:[{data:[analysis.pass,analysis.fail],
        backgroundColor:["#4ade80","#f87171"],borderColor:"#1e293b",borderWidth:4}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{position:"bottom",labels:{color:"#94a3b8",font:{size:12},padding:12}},
        datalabels:{color:"#fff",font:{size:13,weight:"bold"},
          formatter:function(v,ctx){
            var tot=ctx.dataset.data.reduce(function(a,b){return a+b;},0);
            return tot>0?(v/tot*100).toFixed(0)+"%" :"";
          }}}}
  }:null;

  // 얼룩체크 — Y/N 부적합 건수 단순 비교
  var stainConfig=analysis&&analysis.stainStats?{
    type:"bar",
    data:{
      labels:["얼룩체크 Y","얼룩체크 N"],
      datasets:[{
        data:analysis.stainStats.map(function(s){return s.fail;}),
        backgroundColor:["#60a5fa88","#f8717188"],
        borderColor:["#60a5fa","#f87171"],
        borderWidth:2,borderRadius:6,borderSkipped:false
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"#f1f5f9",font:{size:16,weight:"bold"},
          anchor:"end",align:"start",offset:6,
          formatter:function(v){return v+"건";}
        },
        tooltip:{enabled:false}
      },
      scales:{
        x:{ticks:{color:"#94a3b8",font:{size:13,weight:"bold"}},grid:{display:false}},
        y:{display:false}
      }}
  }:null;

  // 품목별 — 막대와 선 완전 분리 (좌축 max를 실제값의 3배로 막대를 하단 1/3에 고정)
  var maxTotal=analysis?Math.max.apply(null,analysis.itemStats.map(function(d){return d.total;})):1;
  var itemConfig=analysis&&analysis.itemStats.length>0?{
    type:"bar",
    data:{labels:analysis.itemStats.map(function(d){return d.name;}),
      datasets:[
        {type:"bar",label:"총건수",data:analysis.itemStats.map(function(d){return d.total;}),
          backgroundColor:"#3b82f699",borderColor:"#60a5fa",borderWidth:2,borderRadius:4,yAxisID:"y1",
          datalabels:{color:"#93c5fd",font:{size:10,weight:"bold"},anchor:"end",align:"top",offset:2,
            clamp:false,formatter:function(v){return v;}}},
        {type:"line",label:"부적합률",data:analysis.itemStats.map(function(d){return d.failRate;}),
          borderColor:"#f87171",backgroundColor:"transparent",borderWidth:2,
          pointRadius:5,pointBackgroundColor:"#f87171",tension:0.3,yAxisID:"y2",
          datalabels:{color:"#fca5a5",font:{size:10,weight:"bold"},
            backgroundColor:"#0f172a",borderRadius:3,
            padding:{left:3,right:3,top:1,bottom:1},
            anchor:"end",align:"top",offset:8,
            formatter:function(v){return v+"%";}}}
      ]},
    options:{responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:40,right:10}},
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:"#1e293b",titleColor:"#f1f5f9",bodyColor:"#94a3b8",
          borderColor:"#334155",borderWidth:1}},
      scales:{
        x:{ticks:{color:"#94a3b8",font:{size:11},maxRotation:30},grid:{color:"#334155"}},
        y1:{position:"left",
          min:0,
          max:Math.ceil(maxTotal*3),
          ticks:{color:"#60a5fa",font:{size:10},
            callback:function(v){return Number.isInteger(v)?v:"";}},
          grid:{color:"#334155"}},
        y2:{position:"right",min:0,max:100,
          ticks:{color:"#f87171",font:{size:10},callback:function(v){return v+"%";}},
          grid:{drawOnChartArea:false}}}}
  }:null;

  // 부적합 유형
  var defectConfig=defectData&&defectData.length>0?{
    type:"bar",
    data:{labels:defectData.map(function(d){return d.name;}),
      datasets:[{data:defectData.map(function(d){return d.value;}),
        backgroundColor:defectData.map(function(d){return d.color;}),
        borderRadius:6,borderSkipped:false}]},
    options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
      layout:{padding:{right:120}},
      plugins:{legend:{display:false},
        datalabels:{color:"#f1f5f9",font:{size:12,weight:"bold"},anchor:"end",align:"right",
          formatter:function(v){return v+"건 ("+(analysis?pct(v,analysis.fail):0)+"%)";}}},
      scales:{x:{display:false},y:{ticks:{color:"#94a3b8",font:{size:12}},grid:{display:false}}}}
  }:null;

  // 트렌드 — 막대 숫자 잘 보이게 상단 여백 확보
  var trendConfig=records.length>0?{
    type:"bar",
    data:{labels:records.map(function(r){return r.label;}),
      datasets:[
        {type:"bar",label:"총QC건수",data:records.map(function(r){return r.total;}),
          backgroundColor:"#3b82f699",borderColor:"#60a5fa",borderWidth:2,borderRadius:4,yAxisID:"y1",
          datalabels:{color:"#93c5fd",font:{size:10,weight:"bold"},anchor:"end",align:"top",offset:2,
            formatter:function(v){return v;}}},
        {type:"line",label:"부적합률",data:records.map(function(r){return r.failRate;}),
          borderColor:"#f87171",backgroundColor:"transparent",borderWidth:2,
          pointRadius:5,pointBackgroundColor:"#f87171",tension:0.3,yAxisID:"y2",
          datalabels:{color:"#fca5a5",font:{size:10,weight:"bold"},
            backgroundColor:"#0f172a",borderRadius:3,padding:2,
            anchor:"end",align:"top",offset:4,
            formatter:function(v){return v+"%";}}}
      ]},
    options:{responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:30}},
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:"#1e293b",titleColor:"#f1f5f9",bodyColor:"#94a3b8",
          borderColor:"#334155",borderWidth:1}},
      scales:{
        x:{ticks:{color:"#94a3b8",font:{size:11}},grid:{color:"#334155"}},
        y1:{position:"left",ticks:{color:"#60a5fa",font:{size:10}},grid:{color:"#334155"}},
        y2:{position:"right",min:0,max:100,
          ticks:{color:"#f87171",font:{size:10},callback:function(v){return v+"%";}},
          grid:{drawOnChartArea:false}}}}
  }:null;

  var C=React.createElement;
  var card=function(children,extra){
    return C("div",{style:Object.assign({background:"#1e293b",borderRadius:10,
      padding:"14px 16px",marginBottom:12},extra||{})},children);
  };
  var secLabel=function(txt){
    return C("div",{style:{fontSize:12,fontWeight:600,color:"#94a3b8",marginBottom:10}},txt);
  };

  return C("div",{style:{maxWidth:960,margin:"0 auto"}},

    // 타이틀
    C("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",
      flexWrap:"wrap",gap:10,marginBottom:16}},
      C("div",null,
        C("h1",{style:{fontSize:18,fontWeight:700}},
          "야간책임운영실 ",C("span",{style:{color:"#60a5fa"}},mon+"월"+day+"일")," QC 현황"),
        fileName?C("div",{style:{fontSize:11,color:"#475569",marginTop:2}},"📄 "+fileName):null
      ),
      C("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
        C("input",{type:"date",value:reportDate,onChange:function(e){setReportDate(e.target.value);},
          style:{background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#f1f5f9",
            padding:"6px 10px",fontSize:13,outline:"none"}}),
        analysis&&!saved?C("button",{onClick:handleSave,disabled:saving,
          style:{background:"#1e3a5f",border:"1px solid #2563eb",borderRadius:8,color:"#60a5fa",
            padding:"6px 14px",cursor:"pointer",fontSize:13}},saving?"저장 중...":"💾 실적 저장"):null,
        saveMsg?C("span",{style:{fontSize:12,color:"#4ade80"}},saveMsg):null,
        analysis?C("button",{onClick:function(){setAnalysis(null);setFileName("");
            setDefectSaved(false);setDefectData(null);setSaved(false);setSaveMsg("");
            setDefects({얼룩:"",손상:"",먼지:""}); },
          style:{background:"#1e293b",border:"1px solid #334155",borderRadius:8,
            color:"#64748b",padding:"6px 12px",cursor:"pointer",fontSize:13}},"🔄"):null
      )
    ),

    error?C("div",{style:{background:"#450a0a",border:"1px solid #f87171",borderRadius:8,
      padding:"10px 14px",color:"#fca5a5",marginBottom:12,fontSize:13}},error):null,

    // 업로드
    !analysis?C("div",{
      style:{border:"2px dashed #334155",borderRadius:14,padding:"40px 24px",textAlign:"center",
        cursor:"pointer",background:"#1e293b",marginBottom:16},
      onClick:function(){document.getElementById("fi").click();},
      onDragOver:function(e){e.preventDefault();},
      onDrop:function(e){e.preventDefault();var f=e.dataTransfer&&e.dataTransfer.files[0];if(f)parseFile(f);}},
      C("div",{style:{fontSize:36,marginBottom:10}},"📂"),
      C("div",{style:{fontSize:14,color:"#94a3b8",marginBottom:6}},"엑셀 또는 CSV 파일 업로드"),
      C("div",{style:{fontSize:11,color:"#475569"}},".xlsx / .xls / .csv"),
      C("input",{id:"fi",type:"file",accept:".xlsx,.xls,.csv",style:{display:"none"},
        onChange:function(e){if(e.target.files[0])parseFile(e.target.files[0]);}})
    ):null,

    analysis?C("div",null,

      // ── Row1: KPI 3개 + 부적합유형 3개 + 원그래프 ────────────────────────
      C("div",{style:{display:"flex",gap:10,marginBottom:12,alignItems:"stretch"}},

        // KPI 3개 + 부적합유형 3개 (세로 2행)
        C("div",{style:{display:"flex",flexDirection:"column",gap:10,flex:1}},
          // KPI 행
          C("div",{style:{display:"flex",gap:10}},
            [["전체 QC 수량",analysis.total.toLocaleString()+"건","#60a5fa"],
             ["부적합",analysis.fail.toLocaleString()+"건","#f87171"],
             ["부적합률",failRate+"%","#fbbf24"]
            ].map(function(k){
              return C("div",{key:k[0],style:{background:"#1e293b",borderRadius:10,
                padding:"14px 16px",flex:1}},
                C("div",{style:{fontSize:11,color:"#64748b",marginBottom:4}},k[0]),
                C("div",{style:{fontSize:26,fontWeight:700,color:k[2],lineHeight:1}},k[1])
              );
            })
          ),
          // 부적합 유형 행 (저장 전: 입력칸 / 저장 후: 수치)
          C("div",{style:{display:"flex",gap:10}},
            !defectSaved
              ? DEFECT_TYPES.map(function(t){
                  return C("div",{key:t,style:{background:"#1e293b",borderRadius:10,
                    padding:"12px 16px",flex:1}},
                    C("div",{style:{fontSize:11,color:"#64748b",marginBottom:6}},t+" (건)"),
                    C("input",{type:"number",min:"0",value:defects[t],
                      onChange:function(e){var v=e.target.value;
                        setDefects(function(p){return Object.assign({},p,{[t]:v});});},
                      style:{width:"100%",textAlign:"center",color:"#f87171",background:"#0f172a",
                        border:"1px solid #334155",borderRadius:6,padding:"6px 8px",
                        fontSize:20,fontWeight:700,outline:"none"}})
                  );
                }).concat([
                  C("div",{key:"etc2",style:{background:"#1e293b",borderRadius:10,
                    padding:"12px 16px",flex:1,opacity:0.6}},
                    C("div",{style:{fontSize:11,color:"#64748b",marginBottom:6}},"기타 (자동)"),
                    C("div",{style:{fontSize:20,fontWeight:700,color:"#94a3b8",textAlign:"center",
                      padding:"6px 0"}},etc)
                  ),
                  C("div",{key:"savebtn",style:{display:"flex",alignItems:"center"}},
                    C("button",{onClick:doSaveDefects,
                      style:{background:"#1e3a5f",border:"1px solid #2563eb",borderRadius:8,
                        color:"#60a5fa",padding:"8px 14px",cursor:"pointer",fontSize:13,
                        whiteSpace:"nowrap"}},"확인")
                  )
                ])
              : [].concat(
                  (defectData||[]).filter(function(d){return DEFECT_TYPES.includes(d.name);}).map(function(d){
                    return C("div",{key:d.name,style:{background:"#1e293b",borderRadius:10,
                      padding:"12px 16px",flex:1,borderTop:"3px solid "+d.color}},
                      C("div",{style:{fontSize:11,color:"#64748b",marginBottom:4}},d.name),
                      C("div",{style:{fontSize:26,fontWeight:700,color:d.color,lineHeight:1}},d.value+"건"),
                      C("div",{style:{fontSize:11,color:"#475569",marginTop:3}},
                        pct(d.value,analysis.fail)+"%")
                    );
                  }),
                  (defectData&&defectData.find(function(d){return d.name==="기타";}))
                    ?[C("div",{key:"etc3",style:{background:"#1e293b",borderRadius:10,
                        padding:"12px 16px",flex:1,borderTop:"3px solid #94a3b8",opacity:0.7}},
                        C("div",{style:{fontSize:11,color:"#64748b",marginBottom:4}},"기타"),
                        C("div",{style:{fontSize:26,fontWeight:700,color:"#94a3b8",lineHeight:1}},
                          defectData.find(function(d){return d.name==="기타";}).value+"건"),
                        C("div",{style:{fontSize:11,color:"#475569",marginTop:3}},
                          pct(defectData.find(function(d){return d.name==="기타";}).value,analysis.fail)+"%")
                      )]:[],
                  [C("div",{key:"editbtn",style:{display:"flex",alignItems:"center"}},
                    C("button",{onClick:function(){setDefectSaved(false);},
                      style:{background:"#1e293b",border:"1px solid #334155",borderRadius:8,
                        color:"#64748b",padding:"8px 12px",cursor:"pointer",fontSize:12}},
                      "수정")
                  )]
                )
          )
        ),

        // 원그래프 — 정사각형 유지
        C("div",{style:{background:"#1e293b",borderRadius:10,padding:"14px 16px",
          width:200,flexShrink:0}},
          secLabel("적합 / 부적합"),
          C("div",{style:{position:"relative",width:"100%",paddingBottom:"100%"}},
            C("div",{style:{position:"absolute",top:0,left:0,right:0,bottom:0}},
              C(ChartBox,{config:pieConfig,height:"100%"})
            )
          )
        )
      ),

      // ── Row2: 품목별 현황 ──────────────────────────────────────────────────
      analysis.itemStats.length>0?card(C("div",null,
        C("div",{style:{display:"flex",alignItems:"center",gap:14,marginBottom:10}},
          secLabel("품목별 QC 현황"),
          C("div",{style:{fontSize:10,color:"#64748b",marginBottom:10}},
            C("span",{style:{display:"inline-block",width:8,height:8,background:"#60a5fa",
              borderRadius:2,marginRight:3,verticalAlign:"middle"}}),"총건수(좌) ",
            C("span",{style:{display:"inline-block",width:12,height:2,background:"#f87171",
              margin:"0 3px",verticalAlign:"middle"}}),"부적합률%(우)"
          )
        ),
        C(ChartBox,{config:itemConfig,height:"260px"})
      )):null,



      // ── Row4: 얼룩체크 ────────────────────────────────────────────────────
      analysis.stainStats?card(C("div",null,
        secLabel("얼룩체크 Y/N → 부적합률 비교"),
        C("div",{style:{fontSize:11,color:"#475569",marginBottom:12,lineHeight:1.6}},
          "가설: ",C("b",{style:{color:"#fbbf24"}},"사전 얼룩체크를 하지 않은(N) 경우"),
          " 세탁 후 부적합률이 높아지는가?",
          C("br",null),
          "N 막대가 Y보다 높을수록 사전 체크의 효과가 입증됩니다."
        ),
        C("div",{style:{display:"flex",gap:16,alignItems:"center"}},
          C("div",{style:{flex:1}},
            C(ChartBox,{config:stainConfig,height:"200px"})
          ),
          C("div",{style:{display:"flex",flexDirection:"column",gap:8,width:160,flexShrink:0}},
            analysis.stainStats.map(function(s){
              return C("div",{key:s.key,style:{background:"#0f172a",borderRadius:8,padding:"10px 14px",
                borderLeft:"3px solid "+(s.key==="N"?"#f87171":"#60a5fa")}},
                C("div",{style:{fontSize:11,color:"#64748b",marginBottom:4}},
                  s.key==="Y"?"✅ 얼룩체크 함 (Y)":"⚠️ 얼룩체크 안함 (N)"),
                C("div",{style:{fontSize:12,color:"#e2e8f0",marginBottom:2}},
                  "총 ",C("b",{style:{color:"#60a5fa"}},s.total),"건"),
                C("div",{style:{fontSize:11,color:"#4ade80"}},s.pass+"건 적합"),
                C("div",{style:{fontSize:11,color:"#f87171"}},s.fail+"건 부적합"),
                C("div",{style:{fontSize:16,fontWeight:700,marginTop:6,
                  color:s.failRate>10?"#f87171":"#4ade80"}},s.failRate+"% 부적합률")
              );
            })
          )
        )
      )):null

    ):null,

    // ── 트렌드 ──────────────────────────────────────────────────────────────
    records.length>0?card(C("div",null,
      C("div",{style:{display:"flex",alignItems:"center",gap:14,marginBottom:8}},
        C("div",{style:{fontSize:12,fontWeight:600,color:"#94a3b8"}},"날짜별 QC 실적 추이"),
        C("div",{style:{fontSize:10,color:"#64748b"}},
          C("span",{style:{display:"inline-block",width:8,height:8,background:"#60a5fa",
            borderRadius:2,marginRight:3,verticalAlign:"middle"}}),"총QC건수(좌) ",
          C("span",{style:{display:"inline-block",width:12,height:2,background:"#f87171",
            margin:"0 3px",verticalAlign:"middle"}}),"부적합률%(우)"
        )
      ),
      C(ChartBox,{config:trendConfig,height:"200px"})
    )):null

  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
