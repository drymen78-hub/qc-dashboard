<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>야간책임운영실 QC 현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#f1f5f9;font-family:'Segoe UI',Arial,sans-serif;padding:12px}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState,useEffect=React.useEffect,useRef=React.useRef;
Chart.register(ChartDataLabels);

var GAS_URL="https://script.google.com/macros/s/AKfycbyQSpwiQBOuLF2oaOaW-Ka35XFmAg9Yp4vmh4P1ByPMUerACu6Ou56-1x4JEuT4_zE8Jw/exec";
var DEFECT_TYPES=["얼룩","손상","먼지"];
var DEFECT_COLORS=["#f87171","#fbbf24","#a78bfa","#94a3b8"];

function st(v){return(v==null?"":String(v)).trim();}
function isPass(v){var t=st(v).replace(/\s/g,"");return t.includes("적합")&&!t.includes("부적합");}
function isFail(v){var t=st(v).replace(/\s/g,"");return t.includes("부적합")||t.includes("불합격");}
function isY(v){return st(v)==="Y";}
function isN(v){return st(v)==="N";}
function fuzzy(cols,t){return cols.find(function(c){return st(c).replace(/\s/g,"")=== t.replace(/\s/g,"");})||cols.find(function(c){return st(c).includes(t);});}
function pct(a,b){return b>0?+(a/b*100).toFixed(1):0;}

// ── ChartBox ──────────────────────────────────────────────────────────────────
function ChartBox(props){
  var ref=useRef(null);
  var chartRef=useRef(null);
  var key=JSON.stringify(props.config);
  useEffect(function(){
    if(!ref.current||!props.config)return;
    if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}
    chartRef.current=new Chart(ref.current,props.config);
    return function(){if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
  },[key]);
  return React.createElement("div",
    {style:{position:"relative",height:props.height||"200px",width:"100%"}},
    React.createElement("canvas",{ref:ref})
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  var r;
  r=useState(null);var analysis=r[0],setAnalysis=r[1];
  r=useState("");var fileName=r[0],setFileName=r[1];
  r=useState(new Date().toISOString().slice(0,10));var reportDate=r[0],setReportDate=r[1];
  r=useState({얼룩:"",손상:"",먼지:""});var defects=r[0],setDefects=r[1];
  r=useState(false);var defectSaved=r[0],setDefectSaved=r[1];
  r=useState(null);var defectData=r[0],setDefectData=r[1];
  r=useState([]);var records=r[0],setRecords=r[1];
  r=useState(false);var saved=r[0],setSaved=r[1];
  r=useState(false);var saving=r[0],setSaving=r[1];
  r=useState("");var saveMsg=r[0],setSaveMsg=r[1];
  r=useState("");var error=r[0],setError=r[1];

  var mon=(reportDate||"").slice(5,7).replace(/^0/,"");
  var day=(reportDate||"").slice(8,10).replace(/^0/,"");

  useEffect(function(){
    fetch(GAS_URL)
      .then(function(res){return res.json();})
      .then(function(rows){
        var recs=rows.filter(function(r){return r[0]&&r[0]!=="날짜";})
          .map(function(r){return{date:st(r[0]),label:st(r[0]).slice(5).replace("-","/"),
            total:Number(r[1]),pass:Number(r[2]),fail:Number(r[3]),failRate:Number(r[4])};})
          .sort(function(a,b){return a.date.localeCompare(b.date);});
        setRecords(recs);
        try{localStorage.setItem("qc_recs",JSON.stringify(recs));}catch{}
      })
      .catch(function(){
        try{var loc=JSON.parse(localStorage.getItem("qc_recs")||"[]");setRecords(loc);}catch{}
      });
  },[]);

  function parseFile(file){
    setFileName(file.name);setError("");setDefectSaved(false);setDefectData(null);
    setSaved(false);setSaveMsg("");setDefects({얼룩:"",손상:"",먼지:""});setAnalysis(null);
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:"",raw:false});
        if(!rows.length){setError("데이터 없음");return;}
        var cols=Object.keys(rows[0]);
        var rC=fuzzy(cols,"품질검사결과");
        var iC=fuzzy(cols,"품목명")||fuzzy(cols,"중분류");
        var total=rows.length,pass=0,fail=0;
        rows.forEach(function(r){if(isPass(r[rC]))pass++;else if(isFail(r[rC]))fail++;});
        var iMap={};
        rows.forEach(function(r){
          var item=st(r[iC])||"미기재";
          if(!iMap[item])iMap[item]={pass:0,fail:0};
          if(isPass(r[rC]))iMap[item].pass++;else if(isFail(r[rC]))iMap[item].fail++;
        });
        var itemStats=Object.entries(iMap)
          .map(function(e){return{name:e[0],pass:e[1].pass,fail:e[1].fail,
            total:e[1].pass+e[1].fail,failRate:pct(e[1].fail,e[1].pass+e[1].fail)};})
          .sort(function(a,b){return b.total-a.total;}).slice(0,12);
        setAnalysis({total:total,pass:pass,fail:fail,itemStats:itemStats});
      }catch(err){setError("파싱 오류: "+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function handleSave(){
    if(!analysis||!reportDate)return;
    setSaving(true);setSaveMsg("");
    var defectFilled={};
    if(defectSaved&&defectData)defectData.forEach(function(x){defectFilled["defect_"+x.name]=x.value;});
    var failRate=pct(analysis.fail,analysis.total);
    var payload=Object.assign({date:reportDate,total:analysis.total,pass:analysis.pass,
      fail:analysis.fail,failRate:failRate},defectFilled);
    var label=reportDate.slice(5).replace("-","/");
    var newRec={date:reportDate,label:label,total:analysis.total,pass:analysis.pass,
      fail:analysis.fail,failRate:failRate};
    var updated=records.filter(function(r){return r.date!==reportDate;});
    updated.push(newRec);updated.sort(function(a,b){return a.date.localeCompare(b.date);});
    try{localStorage.setItem("qc_recs",JSON.stringify(updated));}catch{}
    setRecords(updated);
    fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify(payload)})
      .then(function(){setSaving(false);setSaved(true);setSaveMsg("✓ 저장 완료");})
      .catch(function(){setSaving(false);setSaved(true);setSaveMsg("✓ 저장 완료");});
  }

  function doSaveDefects(){
    var entered=DEFECT_TYPES.reduce(function(s,t){return s+(Number(defects[t])||0);},0);
    var etc=Math.max(0,analysis.fail-entered);
    var data=DEFECT_TYPES.map(function(t,i){return{name:t,value:Number(defects[t])||0,color:DEFECT_COLORS[i]};});
    if(etc>0)data.push({name:"기타",value:etc,color:DEFECT_COLORS[3]});
    data=data.filter(function(d){return d.value>0;});
    setDefectData(data);setDefectSaved(true);
  }

  var failRate=analysis?pct(analysis.fail,analysis.total):0;
  var passRate=analysis?pct(analysis.pass,analysis.total):0;
  var entered=DEFECT_TYPES.reduce(function(s,t){return s+(Number(defects[t])||0);},0);
  var etc=analysis?Math.max(0,analysis.fail-entered):0;

  // ── 원그래프 ─────────────────────────────────────────────────────────────────
  var pieConfig=analysis?{
    type:"doughnut",
    data:{labels:["적합","부적합"],
      datasets:[{data:[analysis.pass,analysis.fail],
        backgroundColor:["#4ade80","#f87171"],borderColor:"#1e293b",borderWidth:3}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{
        legend:{position:"bottom",labels:{color:"#94a3b8",font:{size:10},padding:8}},
        datalabels:{color:"#fff",font:{size:12,weight:"bold"},
          formatter:function(v,ctx){
            var tot=ctx.dataset.data.reduce(function(a,b){return a+b;},0);
            return tot>0?(v/tot*100).toFixed(0)+"%":"";
          }}}}
  }:null;

  // ── 품목별 차트 ───────────────────────────────────────────────────────────────
  // 핵심: 막대는 y1(좌), 선은 y2(우 0~100)
  // y1 max = maxTotal * 2.5 → 막대가 차트 하단 40%에만 위치
  // y2 = 0~100 → 선은 자연히 상단 영역에 위치
  // 두 축이 완전히 다른 스케일이므로 물리적으로 겹치지 않음
  var itemStats=analysis?analysis.itemStats:[];
  var maxTotal=itemStats.length>0?Math.max.apply(null,itemStats.map(function(d){return d.total;})):1;
  // y1 max: 막대 최대높이가 전체 차트의 40%가 되도록
  // 차트 높이=100%(y1 기준), 막대를 40%에 맞추려면 y1max = maxTotal / 0.4
  var y1max=Math.ceil(maxTotal/0.38);

  var itemConfig=analysis&&itemStats.length>0?{
    type:"bar",
    data:{
      labels:itemStats.map(function(d){return d.name;}),
      datasets:[
        {
          type:"bar",
          label:"총건수",
          data:itemStats.map(function(d){return d.total;}),
          backgroundColor:"#3b82f699",
          borderColor:"#60a5fa",
          borderWidth:2,
          borderRadius:4,
          yAxisID:"y1",
          datalabels:{
            color:"#93c5fd",
            font:{size:9,weight:"bold"},
            anchor:"end",
            align:"top",
            offset:1,
            formatter:function(v){return v+"건";}
          }
        },
        {
          type:"line",
          label:"부적합률",
          data:itemStats.map(function(d){return d.failRate;}),
          borderColor:"#f87171",
          backgroundColor:"transparent",
          borderWidth:2,
          pointRadius:4,
          pointBackgroundColor:"#f87171",
          tension:0.4,
          yAxisID:"y2",
          datalabels:{
            color:"#fca5a5",
            font:{size:9,weight:"bold"},
            backgroundColor:"#0f172a",
            borderRadius:3,
            padding:{left:2,right:2,top:1,bottom:1},
            anchor:"end",
            align:"top",
            offset:4,
            formatter:function(v){return v+"%";}
          }
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      layout:{padding:{top:32,right:8}},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:"#1e293b",titleColor:"#f1f5f9",bodyColor:"#94a3b8",
          borderColor:"#334155",borderWidth:1
        }
      },
      scales:{
        x:{
          ticks:{color:"#94a3b8",font:{size:10},maxRotation:25},
          grid:{color:"#334155"}
        },
        y1:{
          position:"left",
          min:0,
          max:y1max,
          ticks:{
            color:"#60a5fa",
            font:{size:9},
            maxTicksLimit:5,
            callback:function(v){return Number.isInteger(v)?v.toLocaleString():"";}
          },
          grid:{color:"#334155"}
        },
        y2:{
          position:"right",
          min:0,
          max:100,
          ticks:{
            color:"#f87171",
            font:{size:9},
            callback:function(v){return v+"%";}
          },
          grid:{drawOnChartArea:false}
        }
      }
    }
  }:null;

  // ── 트렌드 차트 ──────────────────────────────────────────────────────────────
  var trendMax=records.length>0?Math.max.apply(null,records.map(function(r){return r.total;})):1;
  var trendY1max=Math.ceil(trendMax/0.38);
  var trendConfig=records.length>0?{
    type:"bar",
    data:{
      labels:records.map(function(r){return r.label;}),
      datasets:[
        {type:"bar",label:"총QC건수",data:records.map(function(r){return r.total;}),
          backgroundColor:"#3b82f699",borderColor:"#60a5fa",borderWidth:2,borderRadius:4,yAxisID:"y1",
          datalabels:{color:"#93c5fd",font:{size:9,weight:"bold"},anchor:"end",align:"top",offset:1,
            formatter:function(v){return v+"건";}}},
        {type:"line",label:"부적합률",data:records.map(function(r){return r.failRate;}),
          borderColor:"#f87171",backgroundColor:"transparent",borderWidth:2,
          pointRadius:4,pointBackgroundColor:"#f87171",tension:0.4,yAxisID:"y2",
          datalabels:{color:"#fca5a5",font:{size:9,weight:"bold"},
            backgroundColor:"#0f172a",borderRadius:3,padding:{left:2,right:2,top:1,bottom:1},
            anchor:"end",align:"top",offset:4,formatter:function(v){return v+"%";}}}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:28,right:8}},
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:"#1e293b",titleColor:"#f1f5f9",bodyColor:"#94a3b8",
          borderColor:"#334155",borderWidth:1}},
      scales:{
        x:{ticks:{color:"#94a3b8",font:{size:10}},grid:{color:"#334155"}},
        y1:{position:"left",min:0,max:trendY1max,
          ticks:{color:"#60a5fa",font:{size:9},maxTicksLimit:4,
            callback:function(v){return Number.isInteger(v)?v.toLocaleString():"";}}},
          grid:{color:"#334155"}},
        y2:{position:"right",min:0,max:100,
          ticks:{color:"#f87171",font:{size:9},callback:function(v){return v+"%";}},
          grid:{drawOnChartArea:false}}
      }
    }
  }:null;

  var C=React.createElement;

  // ── 공통 카드 스타일 ──────────────────────────────────────────────────────────
  var cardStyle={background:"#1e293b",borderRadius:8,padding:"10px 12px",marginBottom:8};

  return C("div",{style:{maxWidth:960,margin:"0 auto"}},

    // ── 타이틀 바 ──────────────────────────────────────────────────────────────
    C("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",
      flexWrap:"wrap",gap:8,marginBottom:8}},
      C("div",null,
        C("h1",{style:{fontSize:16,fontWeight:700}},
          "야간책임운영실 ",C("span",{style:{color:"#60a5fa"}},mon+"월"+day+"일")," QC 현황"),
        fileName?C("div",{style:{fontSize:10,color:"#475569",marginTop:1}},"📄 "+fileName):null
      ),
      C("div",{style:{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}},
        C("input",{type:"date",value:reportDate,onChange:function(e){setReportDate(e.target.value);},
          style:{background:"#1e293b",border:"1px solid #334155",borderRadius:6,color:"#f1f5f9",
            padding:"4px 8px",fontSize:12,outline:"none"}}),
        analysis&&!saved?C("button",{onClick:handleSave,disabled:saving,
          style:{background:"#1e3a5f",border:"1px solid #2563eb",borderRadius:6,color:"#60a5fa",
            padding:"4px 12px",cursor:"pointer",fontSize:12}},saving?"저장 중...":"💾 저장"):null,
        saveMsg?C("span",{style:{fontSize:11,color:"#4ade80"}},saveMsg):null,
        analysis?C("button",{onClick:function(){setAnalysis(null);setFileName("");
            setDefectSaved(false);setDefectData(null);setSaved(false);setSaveMsg("");
            setDefects({얼룩:"",손상:"",먼지:""}); },
          style:{background:"#1e293b",border:"1px solid #334155",borderRadius:6,
            color:"#64748b",padding:"4px 10px",cursor:"pointer",fontSize:12}},"🔄"):null
      )
    ),

    error?C("div",{style:{background:"#450a0a",border:"1px solid #f87171",borderRadius:6,
      padding:"8px 12px",color:"#fca5a5",marginBottom:8,fontSize:12}},error):null,

    // ── 업로드 ────────────────────────────────────────────────────────────────
    !analysis?C("div",{
      style:{border:"2px dashed #334155",borderRadius:12,padding:"32px 24px",textAlign:"center",
        cursor:"pointer",background:"#1e293b",marginBottom:8},
      onClick:function(){document.getElementById("fi").click();},
      onDragOver:function(e){e.preventDefault();},
      onDrop:function(e){e.preventDefault();var f=e.dataTransfer&&e.dataTransfer.files[0];if(f)parseFile(f);}},
      C("div",{style:{fontSize:32,marginBottom:8}},"📂"),
      C("div",{style:{fontSize:13,color:"#94a3b8",marginBottom:4}},"엑셀 또는 CSV 파일 업로드"),
      C("div",{style:{fontSize:11,color:"#475569"}},".xlsx / .xls / .csv"),
      C("input",{id:"fi",type:"file",accept:".xlsx,.xls,.csv",style:{display:"none"},
        onChange:function(e){if(e.target.files[0])parseFile(e.target.files[0]);}})
    ):null,

    analysis?C("div",null,

      // ── Row1: KPI 3개 + 부적합유형 + 원그래프 ──────────────────────────────
      C("div",{style:{display:"flex",gap:8,marginBottom:8,alignItems:"stretch"}},

        // 왼쪽: KPI + 부적합유형 (2행)
        C("div",{style:{display:"flex",flexDirection:"column",gap:8,flex:1}},

          // KPI 3개
          C("div",{style:{display:"flex",gap:8}},
            [["전체 QC",analysis.total.toLocaleString()+"건","#60a5fa"],
             ["부적합",analysis.fail.toLocaleString()+"건","#f87171"],
             ["부적합률",failRate+"%","#fbbf24"]
            ].map(function(k){
              return C("div",{key:k[0],style:{background:"#1e293b",borderRadius:8,
                padding:"8px 12px",flex:1}},
                C("div",{style:{fontSize:10,color:"#64748b",marginBottom:2}},k[0]),
                C("div",{style:{fontSize:22,fontWeight:700,color:k[2],lineHeight:1}},k[1])
              );
            })
          ),

          // 부적합 유형 (입력 or 결과)
          C("div",{style:{display:"flex",gap:8,flex:1,alignItems:"stretch"}},
            !defectSaved
              ? DEFECT_TYPES.map(function(t){
                  return C("div",{key:t,style:{background:"#1e293b",borderRadius:8,
                    padding:"8px 12px",flex:1}},
                    C("div",{style:{fontSize:10,color:"#64748b",marginBottom:4}},t),
                    C("input",{type:"number",min:"0",value:defects[t],
                      onChange:function(e){var v=e.target.value;
                        setDefects(function(p){return Object.assign({},p,{[t]:v});});},
                      style:{width:"100%",textAlign:"center",color:"#f87171",background:"#0f172a",
                        border:"1px solid #334155",borderRadius:6,padding:"4px",
                        fontSize:18,fontWeight:700,outline:"none"}})
                  );
                }).concat([
                  C("div",{key:"etc",style:{background:"#1e293b",borderRadius:8,
                    padding:"8px 12px",flex:1,opacity:0.5}},
                    C("div",{style:{fontSize:10,color:"#64748b",marginBottom:4}},"기타"),
                    C("div",{style:{fontSize:18,fontWeight:700,color:"#94a3b8",
                      textAlign:"center",padding:"4px 0"}},etc)
                  ),
                  C("div",{key:"btn",style:{display:"flex",alignItems:"center",paddingLeft:2}},
                    C("button",{onClick:doSaveDefects,
                      style:{background:"#1e3a5f",border:"1px solid #2563eb",borderRadius:6,
                        color:"#60a5fa",padding:"6px 10px",cursor:"pointer",fontSize:12,
                        whiteSpace:"nowrap"}},"확인")
                  )
                ])
              : (defectData||[]).map(function(d){
                  return C("div",{key:d.name,style:{background:"#1e293b",borderRadius:8,
                    padding:"8px 12px",flex:1,borderTop:"2px solid "+d.color}},
                    C("div",{style:{fontSize:10,color:"#64748b",marginBottom:2}},d.name),
                    C("div",{style:{fontSize:22,fontWeight:700,color:d.color,lineHeight:1}},d.value+"건"),
                    C("div",{style:{fontSize:10,color:"#475569",marginTop:1}},
                      pct(d.value,analysis.fail)+"%")
                  );
                }).concat([
                  C("div",{key:"editbtn",style:{display:"flex",alignItems:"center",paddingLeft:2}},
                    C("button",{onClick:function(){setDefectSaved(false);},
                      style:{background:"#1e293b",border:"1px solid #334155",borderRadius:6,
                        color:"#64748b",padding:"6px 10px",cursor:"pointer",fontSize:11}},"수정")
                  )
                ])
          )
        ),

        // 오른쪽: 원그래프
        C("div",{style:{background:"#1e293b",borderRadius:8,padding:"10px 12px",
          width:170,flexShrink:0,display:"flex",flexDirection:"column"}},
          C("div",{style:{fontSize:10,fontWeight:600,color:"#64748b",marginBottom:4}},"적합 / 부적합"),
          C("div",{style:{position:"relative",flex:1}},
            C(ChartBox,{config:pieConfig,height:"100%"})
          )
        )
      ),

      // ── Row2: 품목별 현황 ───────────────────────────────────────────────────
      itemStats.length>0?C("div",{style:Object.assign({},cardStyle,{marginBottom:8})},
        C("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6}},
          C("div",{style:{fontSize:11,fontWeight:600,color:"#94a3b8"}},"품목별 QC 현황"),
          C("div",{style:{display:"flex",gap:10,fontSize:9,color:"#64748b"}},
            C("span",null,
              C("span",{style:{display:"inline-block",width:8,height:8,background:"#60a5fa",
                borderRadius:2,marginRight:2,verticalAlign:"middle"}}),"총건수(좌)"),
            C("span",null,
              C("span",{style:{display:"inline-block",width:10,height:2,background:"#f87171",
                marginRight:2,verticalAlign:"middle"}}),"부적합률%(우)")
          )
        ),
        C(ChartBox,{config:itemConfig,height:"200px"})
      ):null,

      // ── Row3: 날짜별 트렌드 ─────────────────────────────────────────────────
      records.length>0?C("div",{style:cardStyle},
        C("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6}},
          C("div",{style:{fontSize:11,fontWeight:600,color:"#94a3b8"}},"날짜별 QC 실적 추이"),
          C("div",{style:{display:"flex",gap:10,fontSize:9,color:"#64748b"}},
            C("span",null,
              C("span",{style:{display:"inline-block",width:8,height:8,background:"#60a5fa",
                borderRadius:2,marginRight:2,verticalAlign:"middle"}}),"총건수(좌)"),
            C("span",null,
              C("span",{style:{display:"inline-block",width:10,height:2,background:"#f87171",
                marginRight:2,verticalAlign:"middle"}}),"부적합률%(우)")
          )
        ),
        C(ChartBox,{config:trendConfig,height:"160px"})
      ):null

    ):null,

    // 업로드 전 트렌드
    !analysis&&records.length>0?C("div",{style:cardStyle},
      C("div",{style:{fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:6}},"날짜별 QC 실적 추이"),
      C(ChartBox,{config:trendConfig,height:"160px"})
    ):null

  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
